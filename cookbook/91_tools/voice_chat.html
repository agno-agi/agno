<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevenLabs Voice RAG Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #countdown {
            font-size: 8rem;
            font-weight: 200;
            color: #fff;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.4s ease;
        }

        #widget-stage {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: #000;
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="countdown">5</div>
    </div>

    <div id="widget-stage"></div>

    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const agentId = urlParams.get('agent_id');

        const countdownEl = document.getElementById('countdown');
        const stageEl = document.getElementById('stage');
        const widgetStage = document.getElementById('widget-stage');

        let remaining = 5;

        const tick = setInterval(() => {
            remaining -= 1;
            if (remaining <= 0) {
                clearInterval(tick);
                stageEl.style.display = 'none';
                showWidget();
            } else {
                countdownEl.textContent = String(remaining);
            }
        }, 1000);

        function showWidget() {
            if (!agentId) {
                widgetStage.style.display = 'flex';
                widgetStage.innerHTML = '<div style="color:#888;font-size:1rem;">Missing agent_id query param.</div>';
                return;
            }
            const widget = document.createElement('elevenlabs-convai');
            widget.setAttribute('agent-id', agentId);
            widgetStage.appendChild(widget);
            widgetStage.style.display = 'flex';
        }
    </script>
</body>
</html>
