# Quiz Generator Skill Configuration
# Defines the capabilities and metadata for the Quiz Generator Agent

name: quiz-generator
version: 1.0.0
description: Educational assessment expert that generates comprehensive MCQ quizzes from any text content

# Author information
author:
  name: Quiz Generator Team
  email: your.email@example.com
  website: https://getbindu.com

# Skill categorization
category: education
tags:
  - education
  - assessment
  - quiz-generation
  - mcq
  - teaching
  - learning
  - content-analysis

# Skill capabilities
capabilities:
  - Generate multiple-choice questions
  - Analyze text content for key concepts
  - Create educational assessments
  - Provide answer explanations
  - Format structured output
  - Process various content types

# Input specifications
input:
  type: text
  description: Any text content to generate quiz questions from
  examples:
    - Scientific articles
    - Historical documents
    - Literary passages
    - Technical documentation
    - Educational materials
  format: plain text or markdown
  min_length: 100 characters
  max_length: 10000 characters

# Output specifications
output:
  type: structured-markdown
  description: 10-question MCQ quiz with explanations
  format: |
    # 📝 Quiz: Knowledge Check
    
    ---
    
    ### Question 1
    [Question text]
    A) [Option A]
    B) [Option B] 
    C) [Option C]
    D) [Option D]
    
    **Correct Answer:** [A/B/C/D]
    **Explanation:** [Brief explanation]
    
    ---
    (Questions 2-10 follow same format)

# Performance characteristics
performance:
  response_time: 5-15 seconds
  accuracy: high
  consistency: very high
  language_support: English
  content_types:
    - academic
    - technical
    - general
    - educational

# Technical requirements
requirements:
  python_version: ">=3.12"
  dependencies:
    - bindu==2026.8.5
    - agno>=2.2.0
    - openai>=2.11.0
    - python-dotenv>=1.0.0
  api_keys:
    - OPENROUTER_API_KEY

# Model configuration
model:
  provider: openrouter
  model_id: openai/gpt-oss-120b
  temperature: 0.3
  max_tokens: 2000
  reasoning: educational

# Use cases
use_cases:
  primary:
    - Classroom assessment generation
    - Study material creation
    - Content validation testing
    - E-learning quiz automation
  secondary:
    - Professional development assessment
    - Training program evaluation
    - Knowledge retention testing
    - Educational content review

# Quality metrics
quality_metrics:
  question_relevance: 95%
  answer_accuracy: 98%
  explanation_clarity: 90%
  format_consistency: 99%
  educational_value: 92%

# Integration endpoints
endpoints:
  primary: http://localhost:3773
  api_docs: http://localhost:3773/docs
  health_check: http://localhost:3773/health

# Security and compliance
security:
  data_privacy: text-only processing
  content_filtering: educational-appropriate
  input_validation: enabled
  output_sanitization: enabled

# Monitoring and logging
monitoring:
  response_logging: true
  error_tracking: enabled
  performance_metrics: collected
  usage_analytics: anonymous

# Deployment configuration
deployment:
  port: 3773
  expose: true
  cors_origins:
    - http://localhost:5173
  storage: memory
  scheduler: memory

# Skill metadata
metadata:
  created_at: "2026-02-19"
  updated_at: "2026-02-19"
  maturity: stable
  maintenance: active
  documentation: complete
  testing_status: verified

# Educational standards compliance
educational_standards:
  blooms_taxonomy:
    - remember
    - understand
    - apply
    - analyze
  question_types:
    - factual_recall
    - conceptual_understanding
    - application
  difficulty_levels:
    - beginner
    - intermediate
    - advanced

# Extension points
extensions:
  custom_templates: true
  difficulty_scaling: planned
  multilingual_support: planned
  scoring_system: planned
  export_formats: planned
