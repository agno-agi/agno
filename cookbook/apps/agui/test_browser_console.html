<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG-UI Stream Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #output { 
            border: 1px solid #ccc; 
            padding: 10px; 
            margin: 10px 0;
            min-height: 100px;
            white-space: pre-wrap;
        }
        #raw { 
            border: 1px solid #ddd; 
            padding: 10px; 
            margin: 10px 0;
            background: #f5f5f5;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>AG-UI Stream Test</h1>
    
    <button onclick="testCopilotKitRoute()">Test CopilotKit Route</button>
    <button onclick="testDebugRoute()">Test Debug Route</button>
    <button onclick="clearOutput()">Clear</button>
    
    <h3>Streamed Content:</h3>
    <div id="output"></div>
    
    <h3>Raw Events:</h3>
    <div id="raw"></div>

    <script>
        const output = document.getElementById('output');
        const raw = document.getElementById('raw');
        
        function clearOutput() {
            output.textContent = '';
            raw.textContent = '';
        }
        
        async function testCopilotKitRoute() {
            clearOutput();
            output.textContent = 'Calling CopilotKit route...\n';
            
            const response = await fetch('http://localhost:3000/api/copilotkit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    variables: {
                        data: {
                            messages: [{
                                id: "msg-1",
                                textMessage: {
                                    role: "user",
                                    content: "Hello!"
                                }
                            }],
                            threadId: "test-thread-browser",
                            runId: "test-run-browser",
                            agentSession: {
                                agentName: "agenticChatAgent",
                                threadId: "test-thread-browser"
                            },
                            agentStates: []
                        }
                    }
                })
            });
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let eventCount = 0;
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const eventData = line.substring(6); // Remove "data: " prefix
                        if (eventData === '[DONE]') {
                            raw.textContent += 'Stream completed\n';
                            break;
                        }
                        
                        if (eventData.trim()) {
                            eventCount++;
                            raw.textContent += `Event ${eventCount}: ${eventData}\n`;
                            
                            try {
                                const data = JSON.parse(eventData);
                                
                                // Extract content from the message
                                const messages = data?.data?.generateCopilotResponse?.messages;
                                if (messages && messages.length > 0) {
                                    const content = messages[0].content;
                                    output.textContent = `Content: "${content}"`;
                                    
                                    // Log content type
                                    raw.textContent += `  -> Content type: ${typeof content}, value: ${JSON.stringify(content)}\n`;
                                }
                            } catch (e) {
                                raw.textContent += `  -> Parse error: ${e.message}\n`;
                            }
                        }
                    }
                }
            }
            
            output.textContent += '\n\nDone!';
        }
        
        async function testDebugRoute() {
            clearOutput();
            output.textContent = 'Calling Debug route...\n';
            
            const response = await fetch('http://localhost:3000/api/copilotkit/debug-route', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({})
            });
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let eventCount = 0;
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const eventData = line.substring(6); // Remove "data: " prefix
                        if (eventData === '[DONE]') {
                            raw.textContent += 'Stream completed\n';
                            break;
                        }
                        
                        if (eventData.trim()) {
                            eventCount++;
                            raw.textContent += `Event ${eventCount}: ${eventData}\n`;
                            
                            try {
                                const data = JSON.parse(eventData);
                                
                                // Extract content from the message
                                const messages = data?.data?.generateCopilotResponse?.messages;
                                if (messages && messages.length > 0) {
                                    const content = messages[0].content;
                                    output.textContent = `Content: "${content}"`;
                                }
                            } catch (e) {
                                raw.textContent += `  -> Parse error: ${e.message}\n`;
                            }
                        }
                    }
                }
            }
            
            output.textContent += '\n\nDone!';
        }
    </script>
</body>
</html>
