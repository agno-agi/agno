<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopilotKit UI Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #chat { 
            border: 1px solid #ccc; 
            padding: 20px; 
            min-height: 400px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .user {
            background: #e3f2fd;
            text-align: right;
        }
        .assistant {
            background: #f5f5f5;
            border: 1px solid #ddd;
        }
        #input-area {
            margin-top: 20px;
        }
        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
        }
        #status {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>CopilotKit UI Test</h1>
    
    <div id="chat"></div>
    
    <div id="input-area">
        <input type="text" id="message" placeholder="Type a message..." value="Hello">
        <button onclick="sendMessage()">Send</button>
        <button onclick="testDebugRoute()">Test Debug Route</button>
    </div>
    
    <div id="status"></div>

    <script>
        const chat = document.getElementById('chat');
        const status = document.getElementById('status');
        
        function addMessage(content, role) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = content;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function updateStatus(text) {
            status.textContent = text;
        }
        
        async function sendMessage() {
            const input = document.getElementById('message');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            updateStatus('Sending message...');
            
            const payload = {
                operationName: "generateCopilotResponse",
                variables: {
                    data: {
                        messages: [{
                            id: "msg-" + Date.now(),
                            textMessage: {
                                role: "user",
                                content: message
                            }
                        }],
                        threadId: "test-ui-thread",
                        agentSession: {
                            agentName: "agenticChatAgent",
                            threadId: "test-ui-thread"
                        },
                        agentStates: []
                    }
                },
                query: `
                mutation generateCopilotResponse($data: GenerateCopilotResponseInput!) {
                  generateCopilotResponse(data: $data) {
                    threadId
                    runId
                    messages @stream {
                      __typename
                      ... on TextMessageOutput {
                        id
                        content @stream
                        role
                      }
                    }
                  }
                }
                `
            };
            
            try {
                const response = await fetch('http://localhost:3000/api/copilotkit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                updateStatus('Streaming response...');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let assistantMessage = '';
                let messageDiv = null;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const eventData = line.substring(6);
                            if (eventData === '[DONE]') {
                                updateStatus('Response complete');
                                break;
                            }
                            
                            if (eventData.trim()) {
                                try {
                                    const data = JSON.parse(eventData);
                                    const messages = data?.data?.generateCopilotResponse?.messages;
                                    if (messages && messages.length > 0) {
                                        const msg = messages[0];
                                        if (msg.__typename === 'TextMessageOutput' && msg.role === 'assistant') {
                                            if (!messageDiv) {
                                                messageDiv = document.createElement('div');
                                                messageDiv.className = 'message assistant';
                                                chat.appendChild(messageDiv);
                                            }
                                            messageDiv.textContent = msg.content;
                                            chat.scrollTop = chat.scrollHeight;
                                        }
                                    }
                                } catch (e) {
                                    console.error('Parse error:', e);
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                updateStatus('Error: ' + error.message);
                console.error('Error:', error);
            }
        }
        
        async function testDebugRoute() {
            updateStatus('Testing debug route...');
            
            try {
                const response = await fetch('http://localhost:3000/api/copilotkit/debug-route', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                updateStatus('Debug route response received');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const eventData = line.substring(6);
                            if (eventData === '[DONE]') {
                                updateStatus('Debug route complete');
                                break;
                            }
                            
                            if (eventData.trim()) {
                                try {
                                    const data = JSON.parse(eventData);
                                    console.log('Debug event:', data);
                                    
                                    const messages = data?.data?.generateCopilotResponse?.messages;
                                    if (messages && messages.length > 0) {
                                        const msg = messages[0];
                                        if (msg.__typename === 'TextMessageOutput') {
                                            addMessage(msg.content, msg.role);
                                        }
                                    }
                                } catch (e) {
                                    console.error('Parse error:', e);
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                updateStatus('Debug route error: ' + error.message);
                console.error('Error:', error);
            }
        }
        
        // Allow Enter key to send message
        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
